name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Run Tests ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URL: mongodb://localhost:27017/testdb
          JWT_SECRET_KEY: test-secret
          JWT_REFRESH_SECRET_KEY: test-refresh-secret
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 8001

  # ── JOB 2: Build & Deploy (only if tests pass) ───────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test                    # ← only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t rainy-partner .
          docker tag rainy-partner:latest 195714074957.dkr.ecr.ap-south-1.amazonaws.com/rainy-partner:latest
          docker push 195714074957.dkr.ecr.ap-south-1.amazonaws.com/rainy-partner:latest

      - name: Deploy via Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name rainy-partner-asg \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}'